# MySQL connection. All values come from the environment with local-dev
# defaults; docker-compose overrides them for the containerized setup.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:socialpath}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# Flyway owns the schema (see db/migration); Hibernate must never touch DDL.
spring.jpa.hibernate.ddl-auto=none
# Sessions end at the service layer; EAGER collection mappings make the
# rendered data available without an open session in the view.
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT: the secret must come from the environment in any real deployment.
# The default below exists only so the app can boot locally out of the box.
jwt.secret=${JWT_SECRET:local-dev-only-secret-key-change-me-0123456789abcdef0123456789abcdef}
# Token lifetime in milliseconds (24 hours).
jwt.expiration=86400000
jwt.cookie-name=token

# Where uploaded media (avatars, publication photos/videos) is stored.
app.media.dir=${MEDIA_DIR:./media}

# Upload limits for publication media
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Surface the real cause in error responses during development
server.error.include-message=always
server.error.include-stacktrace=always
