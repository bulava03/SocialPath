<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialPath</title>
    <link rel="stylesheet" href="/style/layout.css">
    <link rel="stylesheet" href="/style/authFormStyle.css">
</head>
<body>
<div th:insert="~{shared/layoutIndex :: #layoutHeader}"></div>

<div class="container">
    <div class="authtitle">
        <h1>SocialPath</h1>
    </div>
    <div class="authform">
        <form id="authForm" action="/user/authorisation" method="get">
            <div class="authinput">
                <h2 class="name">Login</h2>
                <input class="field" id="login" type="text" autocomplete="username">
                <h2 class="name">Password</h2>
                <input class="field" id="password" type="password" autocomplete="current-password">
                <input class="button" type="button" value="Sign in" onclick="authorize()">
            </div>
        </form>
        <a class="button" href="/registration">Sign up</a>
        <p id="errortext" class="errortext" th:text="${errorText}"></p>
    </div>
</div>

<footer id="layoutFooter">
    <p>&copy; <span th:text="${#dates.year(#dates.createNow())}"></span> - SocialPath</p>
</footer>

<script src="/script/authorization/authorization.js"></script>
</body>
</html>
