<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialPath</title>
    <link rel="stylesheet" href="/style/gradientPage.css" />
    <link rel="stylesheet" href="/style/layout.css" />
    <link rel="stylesheet" href="/style/userIconStyle.css" />
    <link rel="stylesheet" href="/style/groupUpdateStyle.css" />
    <link rel="stylesheet" href="/style/avatarPicker.css" />
</head>
<body>
<div th:insert="~{shared/layout2 :: #layoutHeader}"></div>

<div class="container">
        <div class="authTitle">
            <h1>About the group</h1>
        </div>
        <div class="authForm">
            <form id="regForm" method="post" action="/group/updateGroup" enctype="multipart/form-data">
                <div class="authInput">
                    <input type="hidden" th:value="${group.id}" name="groupId">
                    <div class="avatar-block">
                        <img id="avatar-preview"
                             th:src="${!#strings.isEmpty(group.imageId)} ? '/images/' + ${group.imageId} : '/pictures/photo.png'"
                             alt="Photo" title="Change photo">
                        <div class="avatar-actions">
                            <label for="file" class="avatar-button">Change photo</label>
                            <button type="button" id="remove-photo" class="avatar-button avatar-button-secondary">Remove</button>
                        </div>
                        <input id="file" type="file" name="file" accept="image/*" class="visually-hidden">
                        <input type="hidden" id="removeImage" name="removeImage" value="false">
                    </div>
                    <h2 class="name">Group name</h2>
                    <input class="field" id="name" type="text" th:value="${group.name}" name="Name" />
                    <input class="button" type="submit" value="Save">
                </div>
            </form>
            <div id="backForm">
                <a class="button" id="buttonBack" th:href="@{/searchResult/getGroupPage(groupId=${group.id})}">Back</a>
            </div>
            <p class="errorText" th:text="${errorText}" th:if="${errorText}"></p>
            <p id="errorText" class="errorText"></p>
        </div>
</div>

<footer id="layoutFooter">
    <p>&copy; <span th:text="${#dates.year(#dates.createNow())}"></span> - SocialPath</p>
</footer>

<script src="/script/avatarPreview.js"></script>
<script src="/script/dropdownUser.js"></script>
<script src="/script/authorization/logout.js"></script>
</body>
</html>
