services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: socialpath
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: socialpath
      DB_USER: root
      DB_PASSWORD: root
      MEDIA_DIR: /var/socialpath/media
      # Override in real deployments: JWT_SECRET=<long random string>
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-secret-key-change-me-0123456789abcdef0123456789abcdef}
    volumes:
      # Uploaded media must outlive the container.
      - media-data:/var/socialpath/media
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  media-data:
